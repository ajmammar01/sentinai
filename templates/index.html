<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinAI | Analysis Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --accent: #8b5cf6; /* Electric Violet */
            --accent-strong: #7c3aed;
            --bg-charcoal: #12141a;
            --glass-border: rgba(255, 255, 255, 0.14);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-soft: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen text-slate-100" style="background: radial-gradient(1200px 600px at 10% -10%, #1b1f2b 0%, var(--bg-charcoal) 45%, #0f1117 100%);">
    <main class="max-w-4xl mx-auto px-6 py-16">
        <header class="mb-14">
            <div class="inline-flex items-center gap-2 rounded-full border px-3 py-1 text-xs uppercase tracking-[0.18em]" style="border-color: var(--glass-border); color: #cbd5e1; background: var(--glass-bg-soft);">
                <span class="inline-block w-2 h-2 rounded-full" style="background: var(--accent);"></span>
                Private Analysis
            </div>
            <h1 class="mt-4 text-3xl font-semibold tracking-tight text-white">SentinAI</h1>
            <p class="mt-2 text-sm text-slate-300">Instant, in-memory email triage for modern support teams.</p>
        </header>

        <section class="rounded-2xl p-8 backdrop-blur-xl shadow-2xl" style="background: var(--glass-bg); border: 1px solid var(--glass-border); box-shadow: 0 10px 40px rgba(0,0,0,0.35);">
            <label for="emailContent" class="block text-xs font-semibold uppercase tracking-wider text-slate-300 mb-3">
                Email Content
            </label>
            <textarea
                id="emailContent"
                rows="10"
                class="w-full rounded-xl p-4 text-sm leading-6 text-slate-100 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-violet-400"
                style="background: rgba(10, 12, 18, 0.58); border: 1px solid rgba(255,255,255,0.16);"
                placeholder="Paste raw email content here..."
            ></textarea>

            <div class="mt-6 flex items-center gap-3">
                <button
                    onclick="submitEmail()"
                    id="btn"
                    class="inline-flex items-center justify-center text-white text-sm font-semibold px-6 py-3 rounded-lg disabled:opacity-60 disabled:cursor-not-allowed transition"
                    style="background: linear-gradient(135deg, var(--accent), var(--accent-strong)); box-shadow: 0 8px 24px rgba(139,92,246,0.35);"
                >
                    Analyze
                </button>
                <span id="statusText" class="text-sm text-slate-300"></span>
            </div>
        </section>

        <section id="resultBox" class="hidden mt-10 rounded-2xl p-8 backdrop-blur-xl shadow-2xl" style="background: var(--glass-bg); border: 1px solid var(--glass-border); box-shadow: 0 10px 40px rgba(0,0,0,0.35);">
            <div class="flex items-center justify-between border-b pb-4 mb-6" style="border-color: rgba(255,255,255,0.14);">
                <h2 class="text-lg font-semibold tracking-tight text-white">Analysis Report</h2>
                <span class="text-xs uppercase tracking-wider text-slate-300">Generated Now</span>
            </div>

            <div id="aiOutput" class="space-y-6"></div>

            <div class="mt-8 pt-4 border-t flex items-center justify-between" style="border-color: rgba(255,255,255,0.14);">
                <button onclick="copyResult()" class="text-sm font-medium text-slate-200 hover:text-white">
                    Copy Report
                </button>
                <button onclick="window.location.reload()" class="text-sm font-medium text-slate-300 hover:text-slate-100">
                    Clear
                </button>
            </div>
        </section>
    </main>

    <script>
    async function submitEmail() {
        const content = document.getElementById("emailContent").value.trim();
        const btn = document.getElementById("btn");
        const statusText = document.getElementById("statusText");
        const resultBox = document.getElementById("resultBox");
        const aiOutput = document.getElementById("aiOutput");

        if (!content) {
            alert("Please paste email content first.");
            return;
        }

        btn.disabled = true;
        btn.textContent = "Analyzing...";
        statusText.textContent = "Running model analysis";

        try {
            const response = await fetch("/analyze-only", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ content })
            });

            const data = await response.json();

            if (!response.ok) {
                statusText.textContent = "";
                btn.textContent = "Analyze";
                alert("Unable to analyze this input. Please try again.");
                return;
            }

            if (data.type === "flagged") {
                aiOutput.innerHTML = `
                    <div class="grid gap-2">
                        <p class="text-xs uppercase tracking-wider text-slate-300">Classification</p>
                        <p class="text-sm font-medium text-white">Flagged</p>
                    </div>
                    <div class="grid gap-2">
                        <p class="text-xs uppercase tracking-wider text-slate-300">Reason</p>
                        <p class="text-sm text-slate-100">${data.reason}</p>
                    </div>
                `;
            } else {
                const urgencyTone = data.urgency === "high" || data.urgency === "critical"
                    ? "text-violet-300"
                    : "text-white";

                aiOutput.innerHTML = `
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div class="grid gap-2">
                            <p class="text-xs uppercase tracking-wider text-slate-300">Category</p>
                            <p class="text-sm font-medium text-white">${data.category}</p>
                        </div>
                        <div class="grid gap-2">
                            <p class="text-xs uppercase tracking-wider text-slate-300">Urgency</p>
                            <p class="text-sm font-semibold ${urgencyTone}">${data.urgency}</p>
                        </div>
                    </div>
                    <div class="grid gap-2">
                        <p class="text-xs uppercase tracking-wider text-slate-300">Summary</p>
                        <p class="text-sm text-slate-100 leading-6">${data.summary}</p>
                    </div>
                    <div class="grid gap-2">
                        <p class="text-xs uppercase tracking-wider text-slate-300">Recommended Action</p>
                        <p class="text-sm text-slate-100 leading-6">${data.action_items}</p>
                    </div>
                `;
            }

            resultBox.classList.remove("hidden");
            resultBox.scrollIntoView({ behavior: "smooth", block: "start" });
            statusText.textContent = "Report ready";
            btn.textContent = "Analyze Again";
        } catch (error) {
            console.error(error);
            statusText.textContent = "";
            btn.textContent = "Analyze";
            alert("Connection error. Confirm the backend is running.");
        } finally {
            btn.disabled = false;
        }
    }

    async function copyResult() {
        const reportText = document.getElementById("aiOutput").innerText;
        try {
            await navigator.clipboard.writeText(reportText);
        } catch (error) {
            console.error(error);
            alert("Could not copy report.");
        }
    }
    </script>
</body>
</html>
